@if (active()) {
  <span class="roster-inline-confirm">
    <span class="roster-inline-confirm-text">Delete?</span>
    <button type="button" class="roster-inline-confirm-btn" (click)="onYesClick($event)">Yes</button>
    <button type="button" class="roster-inline-cancel-btn" (click)="onNoClick($event)">No</button>
  </span>
} @else {
  <button type="button" class="roster-delete-btn"
          [attr.aria-label]="'Delete ' + itemLabel()"
          (click)="onTrashClick($event)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" />
    </svg>
  </button>
}
