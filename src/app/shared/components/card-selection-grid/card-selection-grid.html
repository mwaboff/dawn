@if (loading()) {
  <app-card-skeleton [count]="skeletonCount()" />
} @else if (error()) {
  <app-card-error />
} @else {
  @if (maxSelections() > 1) {
    <div class="selection-counter" aria-live="polite">
      {{ selectionCount }}/{{ maxSelections() }} selected
    </div>
  }
  <div class="card-grid" [class.card-grid--wide]="layout() === 'wide'">
    @for (card of cards(); track card.id) {
      <app-daggerheart-card
        [card]="card"
        [selected]="isCardSelected(card)"
        [collapsibleFeatures]="collapsibleFeatures()"
        [layout]="layout()"
        [style.--card-accent]="cardAccentColor(card)"
        (cardClicked)="onCardClicked(card)"
      />
    }
  </div>
}
