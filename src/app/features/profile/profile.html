<div class="profile">
  <div class="grain-overlay profile-grain"></div>

  <header class="profile-header">
    <div class="profile-identity">
      <span class="profile-eyebrow">Adventurer</span>
      <h1 class="profile-name">{{ user()?.username }}</h1>
      <p class="profile-joined">Member since {{ joinDate() }}</p>
    </div>
    <div class="profile-sigil">
      <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <circle cx="32" cy="32" r="28" stroke-dasharray="4 3" />
        <path d="M32 12 L38 28 L54 28 L41 38 L46 54 L32 44 L18 54 L23 38 L10 28 L26 28 Z" />
      </svg>
    </div>
  </header>

  <div class="profile-divider">
    <div class="profile-divider-line"></div>
    <span class="profile-divider-label">Characters</span>
    <div class="profile-divider-line"></div>
  </div>

  <app-roster-list
    [characters]="characters()"
    [loading]="charactersLoading()"
    [error]="charactersError()"
    (viewCharacter)="onViewCharacter($event)"
    (createCharacter)="onCreateCharacter()"
  />

  <div class="profile-divider">
    <div class="profile-divider-line"></div>
    <span class="profile-divider-label">Campaigns</span>
    <div class="profile-divider-line"></div>
  </div>

  <app-campaign-roster
    [campaigns]="campaigns()"
    [loading]="campaignsLoading()"
    [error]="campaignsError()"
    (viewCampaign)="onViewCampaign($event)"
    (createCampaign)="onCreateCampaign()"
  />
</div>
