<div class="reference-page">
  <header class="reference-header">
    <h1 class="reference-title">The Codex</h1>
    <p class="reference-subtitle">Search the archives of adversaries, artifacts, &amp; ancient lore.</p>
  </header>

  <div class="reference-search">
    <input
      class="reference-search-input"
      type="text"
      [value]="query()"
      (input)="onQueryChanged($any($event.target).value)"
      placeholder="Search the archives…"
      aria-label="Search the archives"
    />
  </div>

  <pre class="reference-debug">viewMode: {{ viewMode() }}</pre>

  @if (loading()) {
    <p class="reference-status">Loading…</p>
  }

  @if (error()) {
    <p class="reference-status reference-status--error">Something went wrong. Please try again.</p>
  }

  @if (!loading() && !error() && viewMode() === 'landing') {
    <p class="reference-status">Select a type or search to begin.</p>
  }
</div>
