@if (filters().length > 0) {
  <div class="filter-bar">
    <div class="filter-controls">
      @for (filter of filters(); track filter.key) {
        <div class="filter-control">
          <label class="filter-label" [for]="'filter-' + filter.key">{{ filter.label }}</label>
          @switch (filter.type) {
            @case ('dropdown') {
              <select
                class="filter-select"
                [id]="'filter-' + filter.key"
                [value]="getSelectValue(filter.key)"
                (change)="onFilterChange(filter.key, $any($event.target).value)"
              >
                <option value="">All</option>
                @for (option of filter.options ?? []; track option.value) {
                  <option [value]="option.value">{{ option.label }}</option>
                }
              </select>
            }
            @case ('toggle') {
              <button
                class="toggle-btn"
                [class.active]="isToggleActive(filter.key)"
                [id]="'filter-' + filter.key"
                type="button"
                (click)="onToggle(filter.key)"
              >
                {{ filter.label }}
              </button>
            }
            @case ('dynamic-dropdown') {
              <select
                class="filter-select"
                [id]="'filter-' + filter.key"
                [value]="getSelectValue(filter.key)"
                (change)="onFilterChange(filter.key, $any($event.target).value ? +$any($event.target).value || $any($event.target).value : '')"
              >
                <option value="">All</option>
                @for (option of getDynamicOptions(filter.dynamicSource); track option.id) {
                  <option [value]="option.id">{{ option.name }}</option>
                }
              </select>
            }
            @case ('multiselect') {
              <select
                class="filter-select filter-multiselect"
                [id]="'filter-' + filter.key"
                multiple
                (change)="onFilterChange(filter.key, $any($event.target).value)"
              >
                @for (option of filter.options ?? []; track option.value) {
                  <option [value]="option.value">{{ option.label }}</option>
                }
              </select>
            }
          }
        </div>
      }
    </div>
    <button class="clear-btn" type="button" (click)="onClearFilters()">Clear Filters</button>
  </div>
}
