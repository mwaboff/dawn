<div class="card-edit">
  <app-card-edit-toolbar
    [hasPendingChanges]="hasPendingChanges()"
    [saving]="saving()"
    [error]="error()"
    [saveSuccess]="saveSuccess()"
    (save)="onSave()"
    (back)="onBack()"
  />

  @if (loading()) {
    <div class="card-edit-loading">Loading card data...</div>
  }

  @if (!loading() && rawCard() && schema()) {
    <div class="card-edit-content">
      <form [formGroup]="cardForm" class="card-edit-form">
        @for (section of schema()!.sections; track section.title) {
          <section class="panel">
            <h3 class="panel__title">{{ section.title }}</h3>
            <div class="panel__grid">
              @for (field of section.fields; track field.name) {
                <app-card-edit-field
                  [field]="field"
                  [control]="getControl(field.name)"
                  [submitted]="submitted()"
                  [dependsOnControl]="getDependsOnControl(field)"
                  (createRequested)="openAddExpansionDialog()"
                />
              }
            </div>
          </section>
        }
      </form>

      <app-card-edit-features
        [features]="rawFeatures()"
        [saving]="saving()"
        (featureDirtyChanged)="bumpFormVersion()"
        #featuresRef
      />

      <app-card-edit-preview [card]="previewCard()" />
    </div>
  }

  @if (addExpansionOpen()) {
    <app-add-expansion-dialog
      (created)="onAddExpansionCreated($event)"
      (cancelled)="closeAddExpansionDialog()"
    />
  }
</div>
