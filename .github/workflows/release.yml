name: Release
on:
  push:
    branches: [main]

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dawn:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/dawn:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy dawn to Linode
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: IMAGE_SHA
          script: |
            set -e
            cd /srv/ohsheet
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            sed -i "s|^DAWN_TAG=.*|DAWN_TAG=${IMAGE_SHA}|" .env
            docker compose pull dawn
            docker compose up -d dawn
            docker image prune -f
            docker logout ghcr.io
